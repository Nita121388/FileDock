name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: smoke (open mode)
        run: FILEDOCK_SMOKE_PORT=18787 ./scripts/smoke.sh

      - name: smoke (auth mode)
        run: FILEDOCK_SMOKE_PORT=18788 FILEDOCK_TOKEN="ci-token" ./scripts/smoke.sh
