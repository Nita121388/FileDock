services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/filedock || true;
      mc anonymous set none local/filedock || true;
      "

  filedock-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      - minio-init
    environment:
      FILEDOCK_LISTEN: 0.0.0.0:8787
      FILEDOCK_STORAGE_BACKEND: s3
      FILEDOCK_S3_BUCKET: filedock
      FILEDOCK_S3_REGION: us-east-1
      FILEDOCK_S3_ENDPOINT: http://minio:9000
      FILEDOCK_S3_FORCE_PATH_STYLE: "true"

      # Optional but recommended if exposed beyond localhost:
      # FILEDOCK_TOKEN: change-me

      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8787:8787"

volumes:
  minio-data: {}

